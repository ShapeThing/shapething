name: Publish
on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Publish package
        run: npm ci && npm run css:build && cp dist/shacl-renderer.css lib/style.css && rm -rf dist && cp README.mdx README.md && npx jsr publish --allow-dirty
